{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow glass-card animate-pop">
      <div class="card-body">
        <h4>Feedback for: {{ complaint.subject }}</h4>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-success">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
