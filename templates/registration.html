{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Smart Grievance Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #007BFF, #00C897);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", sans-serif;
    }
    .register-card {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
      width: 380px;
      animation: fadeInUp 0.8s ease-in-out;
    }
    @keyframes fadeInUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    h2 {
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      color: #007BFF;
    }
    .btn-custom {
      background: #007BFF;
      color: #fff;
      width: 100%;
      font-weight: 600;
      border-radius: 8px;
    }
    .btn-custom:hover {
      background: #0056b3;
    }
    .form-text {
      font-size: 0.85rem;
      color: #666;
    }
    .login-link {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
    }
    .login-link a {
      color: #007BFF;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-card">
    <h2>Create Account</h2>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.non_field_errors }}
      
      <div class="mb-3">
        <label class="form-label">Username</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        {{ form.password1 }}
        <div class="form-text">Must be at least 8 characters and not too common.</div>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        {{ form.password2 }}
      </div>

      <button type="submit" class="btn btn-custom">Register</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="{% url 'login' %}">Login</a>
    </div>
  </div>
</body>
</html>
