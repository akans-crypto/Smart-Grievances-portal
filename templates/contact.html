{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <!-- Contact Card -->
      <div class="card shadow-lg border-0 rounded-4 glass-card animate-pop">
        <div class="card-header bg-gradient text-white text-center rounded-top-4" 
             style="background: linear-gradient(135deg, #007BFF, #00C897);">
          <h3 class="mb-0 fw-bold">📩 Contact Us</h3>
        </div>
        <div class="card-body p-4 text-center">
          <p class="lead">We’d love to hear from you! Reach us via email, phone, or visit us at our location.</p>

          <!-- Contact Info -->
          <div class="row mt-4">
            <div class="col-md-4 animate-fade-in">
              <i class="bi bi-telephone-fill fs-1 text-primary"></i>
              <h5 class="fw-bold mt-2">Phone</h5>
              <p>+91 98765 43210</p>
            </div>
            <div class="col-md-4 animate-fade-in" style="animation-delay: .1s;">
              <i class="bi bi-envelope-fill fs-1 text-success"></i>
              <h5 class="fw-bold mt-2">Email</h5>
              <p>support@smartportal.com</p>
            </div>
            <div class="col-md-4 animate-fade-in" style="animation-delay: .2s;">
              <i class="bi bi-geo-alt-fill fs-1 text-danger"></i>
              <h5 class="fw-bold mt-2">Address</h5>
              <p>Amravati, Maharashtra, India</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Map Section -->
      <div class="card shadow-lg border-0 rounded-4 glass-card mt-4 animate-pop">
        <div class="card-body p-0">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3768.4568930378033!2d77.4126!3d19.1611!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcd9d2c1b19b9d9%3A0xabc!2sYour%20College%20Location!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
            width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy">
          </iframe>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Animations -->
<style>
  .animate-pop {
    animation: popIn 0.6s ease forwards;
    transform: scale(0.9);
    opacity: 0;
  }
  .animate-fade-in {
    animation: fadeInUp 0.8s ease forwards;
    opacity: 0;
  }
  @keyframes popIn {
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeInUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
{% endblock %}
